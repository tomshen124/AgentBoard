name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test -p taskloop-core
      - name: Build sidecar
        run: cargo build -p taskloop-sidecar --release

  electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Install deps
        run: cd apps/desktop-electron && npm ci --ignore-scripts
      - name: Typecheck
        run: cd apps/desktop-electron && npm run typecheck
      - name: Build
        run: cd apps/desktop-electron && npx electron-vite build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
